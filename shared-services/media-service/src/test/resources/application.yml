spring:
  application:
    name: media-service-test
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
    eureka:
      enabled: false
  datasource:
    url: jdbc:h2:mem:media_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

storage:
  provider: LOCAL
  local:
    path: ./target/test-uploads
  s3:
    bucket: mock-bucket
    region: us-east-1

eureka:
  client:
    enabled: false
