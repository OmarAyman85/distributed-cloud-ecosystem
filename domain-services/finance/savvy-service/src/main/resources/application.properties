# =============================================================================
# SAVVY EXPENSE TRACKER - APPLICATION CONFIGURATION
# =============================================================================
# This file contains the Spring Boot application configuration.
# Sensitive values are loaded from environment variables defined in .env file.
# =============================================================================

# -----------------------------------------------------------------------------
# APPLICATION IDENTITY
# -----------------------------------------------------------------------------
# The name of the Spring Boot application
spring.application.name=savvy

# -----------------------------------------------------------------------------
# JWT (JSON Web Token) AUTHENTICATION CONFIGURATION
# -----------------------------------------------------------------------------
# Secret key used to sign and verify JWT tokens
# Loaded from environment variable for security
# IMPORTANT: Must be at least 256 bits (32 characters) for HS256 algorithm
app.jwt.secret=${JWT_SECRET_KEY:mySecretKey12345678901234567890123456789012}

# JWT access token expiration time in milliseconds
# Default: 3600000ms = 1 hour
# After this time, the user will need to refresh their token
app.jwt.expiration=${JWT_EXPIRATION:3600000}

# Refresh token expiration time in milliseconds  
# Default: 604800000ms = 7 days
# After this time, the user will need to login again
app.jwt.refresh-expiration=${REFRESH_EXPIRATION:604800000}

# -----------------------------------------------------------------------------
# CORS (Cross-Origin Resource Sharing) CONFIGURATION
# -----------------------------------------------------------------------------
# Allows the frontend application to make requests to this backend
# Multiple origins can be specified as comma-separated values
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# HTTP methods that are allowed for CORS requests
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# Headers that are allowed in CORS requests (* means all headers)
spring.web.cors.allowed-headers=*

# Allow credentials (cookies, authorization headers) in CORS requests
spring.web.cors.allow-credentials=true

# -----------------------------------------------------------------------------
# OAUTH2 CLIENT CONFIGURATION - GITHUB
# -----------------------------------------------------------------------------
# GitHub OAuth2 authentication settings
# Register your app at: https://github.com/settings/developers

# GitHub OAuth2 Client ID
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}

# GitHub OAuth2 Client Secret (kept secure in environment variables)
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

# Scopes requested from GitHub (user profile and email)
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# -----------------------------------------------------------------------------
# OAUTH2 CLIENT CONFIGURATION - GOOGLE
# -----------------------------------------------------------------------------
# Google OAuth2 authentication settings
# Register your app at: https://console.cloud.google.com/
# Create OAuth 2.0 credentials and add authorized redirect URIs

# Google OAuth2 Client ID
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}

# Google OAuth2 Client Secret (kept secure in environment variables)
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Scopes requested from Google (user profile and email)
spring.security.oauth2.client.registration.google.scope=profile,email

# -----------------------------------------------------------------------------
# DATABASE CONFIGURATION - MYSQL
# -----------------------------------------------------------------------------
# PostgreSQL database connection URL
# Format: jdbc:postgresql://[host]:[port]/[database_name]
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/savvy_db}

# Database username (loaded from environment variable)
spring.datasource.username=${DB_USERNAME:postgres}

# Database password (loaded from environment variable for security)
spring.datasource.password=${DB_PASSWORD:postgres}

# JDBC driver class for PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------------------------------------------------------
# JPA/HIBERNATE CONFIGURATION
# -----------------------------------------------------------------------------
# Hibernate DDL auto mode
# - update: Updates the database schema automatically when entity classes change
# - create: Drops and recreates the schema on each startup (USE WITH CAUTION!)
# - validate: Only validates the schema, doesn't make changes
# - none: Disables automatic schema management
spring.jpa.hibernate.ddl-auto=update

# Hibernate Dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show SQL queries in console (useful for debugging)
# Set to false in production for better performance
spring.jpa.show-sql=true

# Disable Open Session In View pattern
# This prevents lazy loading exceptions but requires explicit fetching
# Recommended for better performance and avoiding N+1 query problems
spring.jpa.open-in-view=false

# -----------------------------------------------------------------------------
# LOGGING CONFIGURATION
# -----------------------------------------------------------------------------
# Set logging level for the application
# Options: TRACE, DEBUG, INFO, WARN, ERROR
# logging.level.com.ayman.distributed.savvy=DEBUG

# -----------------------------------------------------------------------------
# SPRING AI OPENAI CONFIGURATION
# -----------------------------------------------------------------------------
spring.ai.openai.api-key=${OPENAI_API_KEY:default-key-to-avoid-startup-crash}
spring.ai.openai.chat.options.model=gpt-4o

# -----------------------------------------------------------------------------
# SERVER CONFIGURATION
# -----------------------------------------------------------------------------
# Server port (default: 8080)
server.port=8082

# Context path (default: /)
# server.servlet.context-path=/api
