# API Gateway Centralized Configuration
server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: authy-service
          uri: lb://authy
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<remaining>.*), /api/${remaining}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: logging-service
          uri: lb://logging-service
          predicates:
            - Path=/api/logs/**

        - id: simuclothing-service
          uri: lb://simuclothing-service
          predicates:
            - Path=/api/fashion/**
          filters:
            - RewritePath=/api/fashion/(?<remaining>.*), /api/${remaining}

        - id: savvy-service
          uri: lb://savvy
          predicates:
            - Path=/api/stats/**, /api/income/**, /api/expense/**, /api/budgets/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
