@if (showAppShell()) {
  <mat-toolbar
    class="fixed top-0 left-0 right-0 h-14 z-[1000] flex items-center justify-between px-4 bg-surface-card border-b border-border-glass"
  >
    <div class="flex items-center gap-3 shrink-0">
      <button
        mat-icon-button
        (click)="collapsed.set(!collapsed())"
        class="text-txt-secondary w-10 h-10 rounded-[10px] transition-all duration-200 hover:text-primary hover:bg-primary/10"
      >
        <mat-icon>{{ collapsed() ? "menu" : "menu_open" }}</mat-icon>
      </button>
      <img
        src="assets/images/logo/icon-logo-cropped.png"
        alt="Savvy"
        class="h-7 w-auto object-contain"
      />
      <span class="text-lg font-bold text-primary tracking-tight">Savvy</span>
    </div>

    <div class="flex-1 flex justify-center max-w-[500px] mx-6 max-md:hidden">
      <div
        class="flex items-center w-full max-w-[360px] h-[38px] px-3.5 bg-surface-glass border border-border-glass rounded-full transition-all duration-200 focus-within:border-primary focus-within:bg-surface-card focus-within:shadow-[0_0_0_3px_rgba(91,122,157,0.1)]"
      >
        <mat-icon
          class="text-txt-light text-lg !w-[18px] !h-[18px] mr-2.5 shrink-0"
          >search</mat-icon
        >
        <input
          type="text"
          placeholder="Search transactions..."
          class="flex-1 border-none bg-transparent outline-none text-sm text-txt-main placeholder:text-txt-light min-w-0"
        />
      </div>
    </div>

    <div class="flex items-center gap-2 shrink-0">
      <button
        mat-icon-button
        class="text-txt-secondary w-10 h-10 rounded-[10px] transition-all duration-200 hover:text-primary hover:bg-primary/10"
        (click)="toggleTheme()"
        [matTooltip]="themeService.darkMode() ? 'Light mode' : 'Dark mode'"
      >
        <mat-icon>{{
          themeService.darkMode() ? "light_mode" : "dark_mode"
        }}</mat-icon>
      </button>
      <button
        mat-icon-button
        class="text-txt-secondary w-10 h-10 rounded-[10px] transition-all duration-200 hover:text-primary hover:bg-primary/10"
        matTooltip="Notifications"
      >
        <mat-icon>notifications_none</mat-icon>
      </button>
      <div
        class="w-9 h-9 rounded-full overflow-hidden cursor-pointer border-2 border-border-glass transition-all duration-200 shrink-0 hover:border-primary hover:scale-105"
        routerLink="/profile"
        matTooltip="Profile"
      >
        <img
          src="assets/profilepicture.jpg"
          alt="Profile"
          class="w-full h-full object-cover"
        />
      </div>
    </div>
  </mat-toolbar>

  <mat-sidenav-container>
    <mat-sidenav opened mode="side" [style.width]="sideNavWidth()">
      <app-custom-sidenav [collapsed]="collapsed()"> </app-custom-sidenav>
    </mat-sidenav>
    <mat-sidenav-content
      class="scrollbar-thin"
      [style.margin-left]="sideNavWidth()"
    >
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <router-outlet></router-outlet>
}
