<h2 mat-dialog-title class="text-txt-main font-bold">
  {{ isEditing ? "Edit" : "Add" }} Investment
</h2>
<mat-dialog-content>
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="flex flex-col gap-2 mt-2"
  >
    <div class="flex gap-4">
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Title</mat-label>
        <input
          matInput
          formControlName="title"
          placeholder="e.g. Apple Stock"
        />
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-1/3">
        <mat-label>Ticker/Symbol</mat-label>
        <input
          matInput
          formControlName="symbol"
          placeholder="AAPL"
          class="uppercase"
        />
      </mat-form-field>
    </div>

    <div class="flex gap-4">
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Amount Invested</mat-label>
        <input
          matInput
          type="number"
          formControlName="amountInvested"
          placeholder="0.00"
        />
      </mat-form-field>

      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Current Value</mat-label>
        <input
          matInput
          type="number"
          formControlName="currentValue"
          placeholder="0.00"
        />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Date Acquired</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date" />
      <mat-datepicker-toggle
        matIconSuffix
        [for]="picker"
      ></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description (Optional)</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions class="flex justify-end gap-2 px-6 pb-4">
  <button mat-button class="!text-txt-secondary" (click)="onCancel()">
    Cancel
  </button>
  <button
    mat-raised-button
    color="primary"
    (click)="onSubmit()"
    [disabled]="form.invalid"
  >
    {{ isEditing ? "Save" : "Add" }}
  </button>
</mat-dialog-actions>
