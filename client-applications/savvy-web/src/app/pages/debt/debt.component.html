<div class="p-8 max-w-7xl mx-auto min-h-screen">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-4xl font-bold mb-2 text-txt-main">Debts & Liabilities</h1>
    <p class="text-txt-secondary text-lg">
      Keep track of loans, credit cards, and other obligations.
    </p>
    <div class="flex items-center gap-2 mt-4">
      <mat-icon class="text-txt-secondary">search</mat-icon>
      <input
        type="text"
        placeholder="Search debts..."
        class="bg-surface-glass border border-border-glass rounded-lg px-3 py-2 text-sm text-txt-main placeholder:text-txt-light focus:outline-none focus:border-primary"
        (input)="onSearchChange($event)"
      />
    </div>
  </div>

  <!-- Grid -->
  <div
    class="grid grid-cols-[repeat(auto-fill,minmax(350px,1fr))] gap-6 max-sm:grid-cols-1"
  >
    @for (item of filteredDebts(); track item.id) {
      <div
        class="glass-card p-6 flex items-center gap-4 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-glass"
      >
        <div
          class="w-12 h-12 rounded-xl flex items-center justify-center bg-danger/10 text-danger"
        >
          <mat-icon>credit_card</mat-icon>
        </div>
        <div class="flex-1 min-w-0">
          <h3 class="text-lg font-semibold mb-0.5 text-txt-main truncate">
            {{ item.title }}
          </h3>
          <p class="text-sm text-txt-secondary m-0 truncate">
            Due: {{ item.dueDate | date }}
          </p>
        </div>
        <div class="text-xl font-bold text-danger whitespace-nowrap">
          -${{ item.amount }}
        </div>
        <div class="flex gap-1">
          <button
            mat-icon-button
            class="!text-txt-light hover:!text-txt-main"
            (click)="openEditDialog(item)"
            matTooltip="Edit"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            class="!text-txt-light hover:!text-danger"
            (click)="deleteDebt(item.id)"
            matTooltip="Delete"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>
    } @empty {
      <div
        class="col-span-full flex flex-col items-center justify-center py-16 text-txt-secondary"
      >
        <mat-icon class="!text-6xl !w-16 !h-16 mb-4 opacity-50"
          >money_off</mat-icon
        >
        <p class="text-xl">No debt records yet.</p>
      </div>
    }
  </div>

  <button
    mat-fab
    class="!fixed !bottom-8 !right-8 !bg-primary !text-white !z-50"
    (click)="openAddDialog()"
    matTooltip="Add Debt"
  >
    <mat-icon>add</mat-icon>
  </button>
</div>
