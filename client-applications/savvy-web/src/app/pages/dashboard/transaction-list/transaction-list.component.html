<div class="glass-card p-6">
  <div class="flex justify-between items-center mb-6">
    <h3 class="m-0 text-xl font-bold text-txt-main">Recent Transactions</h3>
    <button mat-button color="primary">View All</button>
  </div>

  <div class="flex flex-col gap-4">
    @for (t of store.transactions(); track t.id) {
      <div
        class="flex items-center p-4 rounded-2xl bg-white/30 dark-theme:bg-white/5 border border-transparent transition-all duration-200 hover:bg-surface-card hover:border-border-glass hover:shadow-sm hover-lift"
      >
        <!-- Icon -->
        <div
          class="w-12 h-12 rounded-[14px] flex items-center justify-center mr-4"
          [style.background]="getBgColor(t.type)"
          [style.color]="getIconColor(t.type)"
        >
          <mat-icon class="!text-2xl !w-6 !h-6">{{
            t.icon || "receipt"
          }}</mat-icon>
        </div>

        <!-- Info -->
        <div class="flex-1">
          <p class="m-0 font-semibold text-txt-main">{{ t.title }}</p>
          <small class="text-txt-secondary text-sm"
            >{{ t.category }} • {{ t.date | date: "shortDate" }}</small
          >
        </div>

        <!-- Amount -->
        <div
          class="font-bold text-lg"
          [ngClass]="{
            'text-success': t.type === 'income',
            'text-txt-main': t.type === 'expense',
          }"
        >
          {{ t.type === "income" ? "+" : "-" }} {{ t.amount | currency }}
        </div>

        <!-- Delete -->
        <button
          mat-icon-button
          color="warn"
          class="ml-2"
          (click)="deleteTransaction(t.id, t.type)"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    }
  </div>
</div>
