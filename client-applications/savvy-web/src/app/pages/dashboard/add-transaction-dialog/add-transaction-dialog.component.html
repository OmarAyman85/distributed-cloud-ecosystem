<h2 mat-dialog-title class="text-txt-main font-bold">Add Transaction</h2>

<mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-2">
    <!-- Title -->
    <mat-form-field appearance="outline">
      <mat-label>Title</mat-label>
      <input
        matInput
        formControlName="title"
        placeholder="e.g. Grocery Shopping"
      />
      <mat-error *ngIf="form.get('title')?.hasError('required')"
        >Title is required</mat-error
      >
    </mat-form-field>

    <!-- Type & Amount -->
    <div class="flex gap-4">
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Type</mat-label>
        <mat-select formControlName="type">
          <mat-option value="income">Income</mat-option>
          <mat-option value="expense">Expense</mat-option>
        </mat-select>
        <mat-error *ngIf="form.get('type')?.hasError('required')"
          >Type is required</mat-error
        >
      </mat-form-field>

      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Amount</mat-label>
        <input
          matInput
          type="number"
          formControlName="amount"
          placeholder="0.00"
        />
        <mat-error *ngIf="form.get('amount')?.hasError('required')"
          >Amount is required</mat-error
        >
        <mat-error *ngIf="form.get('amount')?.hasError('min')"
          >Amount must be greater than 0</mat-error
        >
      </mat-form-field>
    </div>

    <!-- Category -->
    <mat-form-field appearance="outline">
      <mat-label>Category</mat-label>
      <mat-select formControlName="category">
        @for (cat of categories; track cat) {
          <mat-option [value]="cat">{{ cat }}</mat-option>
        }
      </mat-select>
      <mat-error *ngIf="form.get('category')?.hasError('required')"
        >Category is required</mat-error
      >
    </mat-form-field>

    <!-- Date -->
    <mat-form-field appearance="outline">
      <mat-label>Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date" />
      <mat-datepicker-toggle
        matIconSuffix
        [for]="picker"
      ></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
      <mat-error *ngIf="form.get('date')?.hasError('required')"
        >Date is required</mat-error
      >
    </mat-form-field>

    <!-- Description -->
    <mat-form-field appearance="outline">
      <mat-label>Description (Optional)</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions class="flex justify-end gap-2 px-6 pb-4">
  <button mat-button class="!text-txt-secondary" (click)="onCancel()">
    Cancel
  </button>
  <button
    mat-raised-button
    color="primary"
    (click)="onSubmit()"
    [disabled]="form.invalid"
  >
    Add
  </button>
</mat-dialog-actions>
