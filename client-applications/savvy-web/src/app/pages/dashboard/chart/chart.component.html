<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
  <!-- Bar Chart -->
  <div class="glass-card p-6">
    <h3 class="m-0 mb-1 text-txt-main font-bold text-lg">Financial Overview</h3>
    <p class="m-0 mb-4 text-txt-secondary text-sm">
      Monthly income vs expenses
    </p>
    <div class="relative h-[280px] w-full">
      <canvas
        baseChart
        [data]="barChartData"
        [options]="barChartOptions"
        [type]="barChartType"
      ></canvas>
    </div>
  </div>

  <!-- Doughnut Chart -->
  <div class="glass-card p-6">
    <h3 class="m-0 mb-1 text-txt-main font-bold text-lg">Spending Breakdown</h3>
    <p class="m-0 mb-4 text-txt-secondary text-sm">Expenses by category</p>
    <div class="relative h-[240px] w-full">
      <canvas
        baseChart
        [data]="doughnutChartData"
        [options]="doughnutChartOptions"
        [type]="doughnutChartType"
      ></canvas>
    </div>
  </div>

  <!-- Line Chart -->
  <div class="glass-card p-6 col-span-full">
    <h3 class="m-0 mb-1 text-txt-main font-bold text-lg">Savings Trend</h3>
    <p class="m-0 mb-4 text-txt-secondary text-sm">
      Cumulative net savings over time
    </p>
    <div class="relative h-[220px] w-full">
      <canvas
        baseChart
        [data]="lineChartData"
        [options]="lineChartOptions"
        [type]="lineChartType"
      ></canvas>
    </div>
  </div>
</div>
