<div
  class="glass-card flex flex-col h-full p-6 relative overflow-hidden transition-all duration-300 hover:border-primary-light hover:shadow-[0_12px_32px_rgba(91,122,157,0.15)] group"
>
  <!-- Header -->
  <div class="flex justify-between items-start mb-3">
    <div class="flex items-center gap-3">
      <span
        class="flex items-center justify-center w-10 h-10 rounded-xl bg-primary/10 text-primary"
      >
        <mat-icon class="!text-xl !w-5 !h-5">{{
          getIcon(data().category)
        }}</mat-icon>
      </span>
      <h3
        class="text-[0.9rem] font-semibold text-txt-secondary uppercase tracking-wider m-0"
      >
        {{ data().title }}
      </h3>
    </div>
    <button
      mat-icon-button
      class="!text-txt-light !w-8 !h-8 !leading-8 hover:!text-primary hover:!bg-black/5"
      (click)="showOptions.set(true)"
    >
      <mat-icon class="!text-xl">more_vert</mat-icon>
    </button>
  </div>

  <!-- Body -->
  <div class="flex-1 flex items-center">
    <h1 class="text-[2.2rem] font-extrabold text-txt-main m-0 tracking-tight">
      {{ data().amount | currency }}
    </h1>
  </div>

  <!-- Footer -->
  <div class="mt-4">
    <div
      class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-semibold"
      [ngClass]="{
        'bg-success/10 text-success': data().trend === 'up',
        'bg-danger/10 text-danger': data().trend === 'down',
        'bg-white/5 text-txt-secondary': !data().trend,
      }"
    >
      <mat-icon *ngIf="data().trend === 'up'" class="!text-base !w-4 !h-4"
        >trending_up</mat-icon
      >
      <mat-icon *ngIf="data().trend === 'down'" class="!text-base !w-4 !h-4"
        >trending_down</mat-icon
      >
      <span *ngIf="!data().trend">Note:</span>
      <span class="whitespace-nowrap">{{
        data().trendValue || data().description
      }}</span>
    </div>
  </div>

  @if (showOptions()) {
    <app-widget-options
      [(showOptions)]="showOptions"
      [data]="data()"
    ></app-widget-options>
  }
</div>
